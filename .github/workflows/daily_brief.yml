name: Daily Economics Brief

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back"
        required: false
        default: "3"
        type: string
      fetch_only:
        description: "Only fetch papers (skip LLM analysis)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Restore seen papers from bot-data branch
        run: |
          mkdir -p data
          
          if git ls-remote --heads origin bot-data | grep -q bot-data; then
            git fetch origin bot-data
            git checkout origin/bot-data -- seen_papers.json 2>/dev/null && cp seen_papers.json data/seen_papers.json || echo '[]' > data/seen_papers.json
            git checkout ${{ github.ref_name }}
          else
            echo '[]' > data/seen_papers.json
          fi
          echo "Seen papers count: $(python3 -c "import json; print(len(json.load(open('data/seen_papers.json'))))")"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyyaml requests feedparser lxml

      - name: Generate Brief
        run: |
          if [ "${{ github.event.inputs.fetch_only }}" = "true" ]; then
            python -m econ_brief --fetch-only
          else
            python -m econ_brief
          fi
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '3' }}

      - name: Commit and push changes
        if: success() || failure()
        run: |
          git config user.name "econ-brief-bot"
          git config user.email "bot@econ-brief.local"

          # 1. 提交简报和状态文件到 main 分支
          git add output/briefings/*.md 2>/dev/null || true
          git add data/seen_papers.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "没有需要提交的变更。"
          else
            echo "提交变更..."
            git commit -m "📊 Update briefing and state [$(date +'%Y-%m-%d')]"
            git push origin ${{ github.ref_name }}
          fi

          # 2. 更新 bot-data 分支（独立存储状态）
          if [ -f "data/seen_papers.json" ]; then
            echo "更新 bot-data 分支..."
            git checkout --orphan bot-data-temp 2>/dev/null || true
            git rm -rf --cached . 2>/dev/null || true
            cp data/seen_papers.json .
            cp data/run_log.json . 2>/dev/null || true
            git add seen_papers.json 2>/dev/null || true
            git add run_log.json 2>/dev/null || true
            git commit -m "🔄 Update state [$(date +'%Y-%m-%d')]"
            git push origin bot-data-temp:bot-data --force
            git checkout ${{ github.ref_name }}
          fi
