name: Daily Economics Brief

on:
  schedule:
    # 0:17 UTC = 8:17 AM Beijing Time (UTC+8)
    # Off-minute to avoid GitHub Actions cron stampede
    - cron: "17 0 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back"
        required: false
        default: "3"
        type: string
      fetch_only:
        description: "Only fetch papers (skip LLM analysis)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyyaml requests feedparser lxml

      - name: Generate Brief
        run: |
          # 生成简报脚本
          python -m econ_brief
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GH_PAT: ${{ secrets.GH_PAT }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || 3 }}

      - name: Commit briefing and state
        run: |
          git config user.name "econ-brief-bot"
          git config user.email "bot@econ-brief.local"
          
          # 1. 确保我们还在正确的分支上
          git checkout ${{ github.ref_name }}
          
          # 2. 添加我们要提交的文件（只添加简报和状态文件）
          git add output/briefings/*.md || true
          git add data/seen_papers.json || true
          
          # 3. 检查是否有变更需要提交
          if git diff --cached --quiet; then
            echo "没有需要提交的变更。"
          else
            echo "提交变更..."
            git commit -m "📊 Update briefing and state [$(date +'%Y-%m-%d')]"
            
            # 4. 使用 GH_PAT 推送
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git ${{ github.ref_name }}
          fi

          # Update seen_papers on bot-data branch
          if [ -f "data/seen_papers.json" ]; then
            git checkout --orphan bot-data-temp 2>/dev/null || true
            git rm -rf --cached . 2>/dev/null || true
            cp data/seen_papers.json .
            cp data/run_log.json . 2>/dev/null || true
            git add seen_papers.json run_log.json 2>/dev/null || git add seen_papers.json
            git commit -m "🔄 Update state [$(date +%Y-%m-%d)]"
            git push origin bot-data-temp:bot-data --force

            git checkout ${{ github.ref_name }}
          fi

      - name: Push changes
        if: success() || failure()
        run: |
          git push origin ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
