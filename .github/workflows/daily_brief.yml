name: Daily Economics Brief

on:
  schedule:
    # 0:17 UTC = 8:17 AM Beijing Time (UTC+8)
    # Off-minute to avoid GitHub Actions cron stampede
    - cron: "17 0 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back"
        required: false
        default: "3"
        type: string
      fetch_only:
        description: "Only fetch papers (skip LLM analysis)"
        required: false
        default: false
        type: boolean

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Restore seen papers from bot-data branch
        run: |

          git checkout -- .
          git clean -fdX

          mkdir -p data
          
          if git ls-remote --heads origin bot-data | grep -q bot-data; then
            echo "发现远程分支 bot-data，尝试获取状态文件..."
            git fetch origin bot-data
            git show origin/bot-data:seen_papers.json > data/seen_papers.json 2>/dev/null || echo '[]' > data/seen_papers.json
          else
            echo "未发现远程分支 bot-data，创建新的状态文件。"
            echo '[]' > data/seen_papers.json
          fi

          git checkout -f ${{ github.ref_name }}
          echo "Seen papers count: $(python3 -c "import json; print(len(json.load(open('data/seen_papers.json'))))")"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run econ-brief pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '3' }}
        run: |
          if [ "${{ github.event.inputs.fetch_only }}" = "true" ]; then
            python -m econ_brief --fetch-only
          else
            python -m econ_brief
          fi

      - name: Commit briefing and state
        if: success() || failure()
        run: |
          git config user.name "econ-brief-bot"
          git config user.email "bot@econ-brief.local"

          # Commit generated briefing to main branch
          if [ -f "output/briefings/$(date +%Y-%m-%d).md" ]; then
            git add output/briefings/
            git diff --staged --quiet || git commit -m "📊 Add briefing for $(date +%Y-%m-%d)"
          fi

          # Update seen_papers on bot-data branch
          if [ -f "data/seen_papers.json" ]; then
            git checkout --orphan bot-data-temp 2>/dev/null || true
            git rm -rf --cached . 2>/dev/null || true
            cp data/seen_papers.json .
            cp data/run_log.json . 2>/dev/null || true
            git add seen_papers.json run_log.json 2>/dev/null || git add seen_papers.json
            git commit -m "🔄 Update state [$(date +%Y-%m-%d)]"
            git push origin bot-data-temp:bot-data --force

            git checkout ${{ github.ref_name }}
          fi

      - name: Push changes
        if: success() || failure()
        run: |
          git push origin ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
