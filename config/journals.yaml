# ArXiv categories to monitor
arxiv_categories:
  - econ.GN  # General Economics
  - econ.EM  # Econometrics
  - econ.TH  # Theoretical Economics

# Fetch settings
fetch:
  lookback_days: 3  # How many days back to fetch (covers weekends)
  openalex_per_page: 50
  arxiv_max_results: 200
  nber_per_page: 100

# Relevance filter
relevance:
  min_score: 6.0  # Minimum Haiku relevance score (1-10)
  max_papers_stage2: 30  # Cap on papers going to Stage 2 deep analysis
